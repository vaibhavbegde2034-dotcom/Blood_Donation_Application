<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Requests | BloodCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root { --navy: #14274E; --red: #FF4D6D; --bg: #F5F7FB; --white: #FFFFFF; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #333; margin: 0; }
        
        /* Hero */
        .hero { background: var(--navy); color: white; padding: 80px 20px; text-align: center; border-radius: 0 0 50px 50px; position: relative; overflow: hidden; }
        .hero h1 { font-size: 3rem; font-weight: 800; margin-bottom: 10px; }
        
        /* Filter Card */
        .filter-card { background: var(--white); max-width: 900px; margin: -50px auto 40px; padding: 30px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); display: grid; grid-template-columns: repeat(3, 1fr) auto; gap: 15px; align-items: end; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        input, select { padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 12px; font-family: inherit; }
        
        /* Grid */
        .req-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto 80px; padding: 0 20px; }
        .req-card { background: white; border-radius: 24px; padding: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.04); transition: 0.3s; border: 1px solid #edf2f7; }
        .req-card:hover { transform: translateY(-5px); box-shadow: 0 20px 30px rgba(0,0,0,0.1); }
        
        /* Badges */
        .badge { padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .urgency-CRITICAL { background: #fee2e2; color: #b91c1c; }
        .urgency-URGENT { background: #fff7ed; color: #c2410c; }
        .urgency-NORMAL { background: #f0fdf4; color: #166534; }
        
        .btn-red { background: var(--red); color: white; border: none; padding: 14px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; }
    </style>
</head>
<body>
    <header class="hero">
        <h1>Emergency Requests</h1>
        <p>Verified emergency blood needs across our network.</p>
    </header>

    <section class="filter-card">
        <div class="input-group"><label>Blood Group</label><select><option>All Groups</option><option>A+</option><option>O+</option></select></div>
        <div class="input-group"><label>City</label><input type="text" placeholder="e.g. Pune"></div>
        <div class="input-group"><label>Urgency</label><select><option>All</option><option>Critical</option></select></div>
        <button class="btn-red">Apply Filters</button>
    </section>

    <div class="req-grid" id="request-container">
        <!-- Request cards will be injected here -->
    </div>

    <script>
        // Placeholder for dynamic rendering logic with role-based visibility
        const requests = [{ id: 1, patient: "Amit Sharma", blood: "B+", units: 2, hospital: "Ruby Hall", urgency: "CRITICAL", createdBy: "vaibhav@example.com" }];
        const currentUser = "vaibhav@example.com";

        const container = document.getElementById('request-container');
        container.innerHTML = requests.map(r => `
            <div class="req-card">
                <span class="badge urgency-${r.urgency}">${r.urgency}</span>
                <h3 style="margin: 15px 0 5px;">${r.patient}</h3>
                <p style="color: #64748b;"><i class="fas fa-hospital"></i> ${r.hospital}</p>
                <div style="display: flex; gap: 15px; margin: 20px 0;">
                    <div style="background: #f1f5f9; padding: 10px 15px; border-radius: 12px;"><strong>${r.blood}</strong></div>
                    <div style="background: #f1f5f9; padding: 10px 15px; border-radius: 12px;"><strong>${r.units} Units</strong></div>
                </div>
                ${r.createdBy === currentUser ? 
                    `<button class="btn-red" style="width:100%"><i class="fas fa-phone"></i> Call Donor</button>` : 
                    `<div style="text-align:center; padding: 15px; background: #f8fafc; border: 1px dashed #cbd5e1; border-radius:12px;">
                        <i class="fas fa-lock" style="color:#94a3b8;"></i> 
                        <p style="font-size:0.8rem; margin:5px 0 0;">Only requester can view contact details.</p>
                    </div>`
                }
            </div>
        `).join('');
    </script>
</body>
</html>
