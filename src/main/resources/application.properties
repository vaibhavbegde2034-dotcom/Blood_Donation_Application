# Application Name
spring.application.name=Blood Donation Application

# Database Configuration
# Render provides SPRING_DATASOURCE_URL. If missing, it defaults to local MySQL.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/BLOOD_DONATION_APPLICATION?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Vaibhav2034}

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Do NOT set hibernate.dialect; let Spring Boot detect it from the driver.

# Server Port
server.port=${PORT:8080}

# SMTP / Email OTP
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.connectiontimeout=${SPRING_MAIL_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${SPRING_MAIL_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${SPRING_MAIL_WRITE_TIMEOUT:5000}
app.mail.from=${APP_MAIL_FROM:${SPRING_MAIL_USERNAME:}}
